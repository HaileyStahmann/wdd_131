<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Hailey Colt">
    <meta name="description" content="A digital collection of recipes including images, descriptions, and ratings.">
    <title>Recipe Book</title>
    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A digital collection of recipes including images, descriptions, and ratings.">
    <meta property="og:url" content="https://github.com/HaileyStahmann/wdd131/recipes">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card --> 
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A digital collection of recipes including images, descriptions, and ratings.">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <!-- Google Font Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
                    
</head>
<body>
    <header> 
        <div class="recipe-book-logo">        
            <img src="./images/recipe-book.png" alt="Recipe book logo">
            <h1>Recipe Book</h1>
        </div>
        <div class="search-bar">
            <input id="search" type="text" placeholder="Find a recipe">
            <button id="search-button"> 
                <img src="./images/search.svg" alt="Magnifying glass icon for search bar">
            </button>
        </div>
    </header>      
    <hr>           
    <div>
        <div id="recipes">
            
        </div>
        <div class="recipe-card">  
        </div>
    </div>   
    <footer>                     
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="./images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="./images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="./images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div> 
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
    </footer>
</body>
</html>
